events {
  worker_connections 1024;
}
http {
  upstream backends {
    server backend-1:3000;
    server backend-2:3000;
    server backend-3:3000;
  }
  server {
    listen 80;
    location / {
      proxy_pass http://backends;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
